<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset="0.55" stop-color="#0a1224"/>
      <stop offset="1" stop-color="#061019"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.22" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="tile1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="tile2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="tile3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#34d399"/></linearGradient>
    <linearGradient id="tile4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="candleG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#34d399" stop-opacity="0.15"/></linearGradient>
    <linearGradient id="candleR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f87171"/><stop offset="1" stop-color="#f87171" stop-opacity="0.15"/></linearGradient>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glow1)"/>
  <rect width="1280" height="340" fill="url(#glow2)"/>

  <!-- grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 60h1280M0 120h1280M0 180h1280M0 240h1280M0 300h1280"/>
    <path d="M80 0v340M200 0v340M320 0v340M440 0v340M560 0v340M680 0v340M800 0v340M920 0v340M1040 0v340M1160 0v340"/>
  </g>

  <!-- mosaic logo -->
  <g transform="translate(84,86)">
    <rect x="0" y="0" width="26" height="26" rx="6" fill="url(#tile1)"/>
    <rect x="32" y="0" width="26" height="26" rx="6" fill="url(#tile2)"/>
    <rect x="0" y="32" width="26" height="26" rx="6" fill="url(#tile3)"/>
    <rect x="32" y="32" width="26" height="26" rx="6" fill="url(#tile4)"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="164" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff">DeFi<tspan fill="url(#brand)">Mosaic</tspan></text>
  <text x="166" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="600" fill="#9aa4c7">OWN THE NEXT MOVE. — real markets, zero-risk adrenaline, on-chain conviction</text>

  <!-- feature chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">
    <rect x="166" y="196" width="176" height="34" rx="17" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.5"/>
    <text x="184" y="218" fill="#fbbf24">⚔️ Arena · 450+ markets</text>
    <rect x="354" y="196" width="160" height="34" rx="17" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text x="372" y="218" fill="#67e8f9">⏪ Time Machine 60×</text>
    <rect x="526" y="196" width="150" height="34" rx="17" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="544" y="218" fill="#6ee7b7">🏦 Be the House</text>
    <rect x="688" y="196" width="176" height="34" rx="17" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.5"/>
    <text x="706" y="218" fill="#c4b5fd">🧾 Trustless receipts</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">
    <text x="166" y="262" fill="#64748b">Polygon Amoy · Next.js 15 · Binance live data · Supabase · 500 XP free bankroll</text>
  </g>

  <!-- candlestick sculpture right -->
  <g transform="translate(950,50)">
    <rect x="0"   y="150" width="16" height="90"  rx="4" fill="url(#candleG)"/>
    <rect x="26"  y="110" width="16" height="130" rx="4" fill="url(#candleR)"/>
    <rect x="52"  y="70"  width="16" height="170" rx="4" fill="url(#candleG)"/>
    <rect x="78"  y="120" width="16" height="120" rx="4" fill="url(#candleG)"/>
    <rect x="104" y="90"  width="16" height="150" rx="4" fill="url(#candleR)"/>
    <rect x="130" y="40"  width="16" height="200" rx="4" fill="url(#candleG)"/>
    <rect x="156" y="100" width="16" height="140" rx="4" fill="url(#candleG)"/>
    <path d="M-4 200 L34 168 L60 180 L86 140 L112 152 L138 96 L164 120 L190 78" stroke="url(#brand)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="190" cy="78" r="6" fill="#22d3ee"/>
    <circle cx="190" cy="78" r="11" fill="#22d3ee" fill-opacity="0.25"/>
  </g>

  <!-- orbit accent -->
  <g transform="translate(1180,90)" stroke="#38bdf8" stroke-opacity="0.35" fill="none">
    <ellipse rx="46" ry="16" transform="rotate(-18)"/>
    <ellipse rx="66" ry="24" transform="rotate(-18)"/>
  </g>
  <circle cx="1180" cy="90" r="9" fill="url(#brand)"/>
</svg>
